
  pyodide:
    needs: [sdist]
    runs-on: ubuntu-latest
    name: "cp313 pyodide_2025_0_wasm32"
    steps:
      - name: Get build-requirements.txt from repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # The tag to build or the tag received by the tag event
          ref: ${{ github.event.inputs.version || github.ref }}
          persist-credentials: false
          sparse-checkout: |
            ${{ env.BUILD_REQUIREMENTS_PATH }}
            ${{ env.UV_REQUIREMENTS_PATH }}
          sparse-checkout-cone-mode: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.13"
        timeout-minutes: 3

      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9
        with:
          # Pyodide's emscripten build passes nightly-only `-Z` flags
          # (link-native-libraries, emscripten-wasm-eh).
          toolchain: nightly
          target: wasm32-unknown-emscripten

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cryptography-sdist

      - run: pip install cibuildwheel
      - run: mkdir wheelhouse
      - name: Build the wheel
        # cibuildwheel's pyodide build identifier is cp313-pyodide_wasm32; the
        # final wheel platform tag (pyodide_2025_0_wasm32) is set by
        # pyodide-build via PYODIDE_ABI_VERSION on Pyodide 0.29.x.
        #
        # Pyodide does not expose a downstream-linkable OpenSSL (its _ssl is
        # baked into pyodide.asm.wasm), so we cross-compile OpenSSL ourselves
        # in CIBW_BEFORE_BUILD_PYODIDE -- it runs after cibuildwheel has
        # activated emsdk, so emcc/emconfigure/emmake are on PATH.
        run: cibuildwheel --platform pyodide --output-dir wheelhouse/ cryptography*.tar.gz
        env:
          CIBW_BUILD: "cp313-pyodide_wasm32"
          OPENSSL_VERSION: "3.5.4"
          CIBW_BEFORE_BUILD_PYODIDE: |
            set -e
            if [ ! -f /tmp/openssl-pyodide/lib/libssl.a ]; then
              rm -rf /tmp/openssl-build
              mkdir -p /tmp/openssl-build
              cd /tmp/openssl-build
              curl -fsSL "https://github.com/openssl/openssl/releases/download/openssl-${OPENSSL_VERSION}/openssl-${OPENSSL_VERSION}.tar.gz" -o openssl.tar.gz
              tar xzf openssl.tar.gz
              cd "openssl-${OPENSSL_VERSION}"
              # emconfigure sets CROSS_COMPILE=<emsdk>/em expecting Configure
              # to append "cc"/"ar"/etc. -- but it also sets CC to the full
              # emcc path, so OpenSSL ends up concatenating them. Override
              # both with an empty cross-compile prefix and a bare CC name.
              emconfigure ./Configure linux-generic32 \
                no-shared no-asm no-engine no-dso no-tests no-srtp no-cms \
                no-ui-console no-threads \
                --cross-compile-prefix= \
                CC=emcc AR=emar RANLIB=emranlib \
                --prefix=/tmp/openssl-pyodide
              emmake make -j"$(nproc)" build_libs
              emmake make install_dev
            fi
          CIBW_ENVIRONMENT_PYODIDE: >-
            OPENSSL_VERSION=$OPENSSL_VERSION
            OPENSSL_DIR=/tmp/openssl-pyodide
            OPENSSL_STATIC=1
            OPENSSL_NO_VENDOR=1

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: "cryptography-${{ github.event.inputs.version }}-cp313-pyodide_2025_0_wasm32"
          path: wheelhouse/
